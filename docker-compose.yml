version: "3.9"

services:
  app:
    build: .
    container_name: wedding-app
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wedding-chapel.rule=Host(`miamiweddingsofficiant.com`) || Host(`www.miamiweddingsofficiant.com`)"
      - "traefik.http.routers.wedding-chapel.entrypoints=websecure"
      - "traefik.http.routers.wedding-chapel.tls=true"
      - "traefik.http.routers.wedding-chapel.tls.certresolver=mytlschallenge"
      - "traefik.http.services.wedding-chapel.loadbalancer.server.port=4000"
    networks:
      - n8n_evoapi

networks:
  n8n_evoapi:
    external: true