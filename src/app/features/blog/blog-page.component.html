<article
  class="container mx-auto max-w-7xl px-4 py-12 md:py-16"
  aria-labelledby="blog-page-title"
>
  <header class="border-b border-black/[0.06] pb-8">
    <h1
      id="blog-page-title"
      class="font-display text-3xl md:text-4xl font-semibold text-accent-sapphire tracking-tight"
    >
      {{ 'NAV_BLOG' | translate }}
    </h1>
  </header>

  <ul class="mt-10 space-y-6 font-body">
    @for (post of blogPosts; track post.slug) {
      <li>
        <a
          [routerLink]="['/', i18n.currentLang(), 'blog', post.slug]"
          class="group block rounded-lg border border-black/[0.08] bg-white/60 p-6 shadow-wix-soft transition hover:border-secondary-gold/40 hover:shadow-md"
        >
          <h2
            class="font-display text-xl md:text-2xl font-semibold text-accent-sapphire group-hover:text-secondary-gold transition-colors"
          >
            {{ post.title[i18n.currentLang()] }}
          </h2>
          <p class="mt-2 text-sm md:text-base text-text-dark/80 max-w-3xl leading-relaxed">
            {{ post.description[i18n.currentLang()] }}
          </p>
          <span
            class="mt-3 inline-block text-sm font-semibold text-accent-sapphire underline-offset-2 group-hover:underline"
          >
            {{ post.readMoreKey | translate }}
          </span>
        </a>
      </li>
    }
  </ul>
</article>
