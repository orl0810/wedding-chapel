<section class="hero" id="hero" aria-label="Hero section">

  <!-- Layered background -->
  <div class="hero__bg" aria-hidden="true">
    <div class="hero__bg-image"></div>
    <div class="hero__bg-overlay"></div>
  </div>

  <!-- Main content -->
  <div class="hero__content">
    <p class="hero__eyebrow">
      <span class="eyebrow-line" aria-hidden="true"></span>
      ✦ {{ t('hero.eyebrow') }} ✦
      <span class="eyebrow-line" aria-hidden="true"></span>
    </p>

    <h1 class="hero__title">
      Your Love Story<br>
      Deserves a <em>Perfect</em><br>
      Beginning
    </h1>

    <p class="hero__subtitle">{{ t('hero.subtitle') }}</p>

    <div class="hero__ctas">
      <button class="btn-primary" (click)="scrollTo('contact')" aria-label="Book your wedding date">
        ✦ &nbsp;{{ t('hero.cta') }}
      </button>
      <button class="btn-ghost" (click)="scrollTo('packages')" aria-label="View ceremony packages">
        {{ t('hero.ctaSecondary') }}
      </button>
    </div>
  </div>

  <!-- Scroll cue -->
  <div class="hero__scroll" aria-hidden="true">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>

</section>
